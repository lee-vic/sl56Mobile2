<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>交货清单确认</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="confirm-content">
  <ion-grid fixed class="confirm-shell">
    <ion-row class="ion-justify-content-center ion-padding-top">
      <ion-col size="12" size-md="10" size-lg="8">
        <ion-card class="page-header-card ion-no-margin ion-margin-bottom">
          <ion-card-header>
            <ion-card-title>交货清单确认</ion-card-title>
            <ion-card-subtitle>勾选需要确认的运单，支持按单号快速筛选。</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <ion-searchbar placeholder="请输入单号" showClearButton="focus" (ionInput)="getItems($event)"></ion-searchbar>
          </ion-card-content>
        </ion-card>

        <ion-card *ngFor="let item of searchList" class="record-card ion-no-margin ion-margin-bottom">
          <ion-list lines="none">
            <ion-item class="bottom-border">
              <ion-checkbox aria-label="选择单号" [(ngModel)]="item.Selected" slot="start"></ion-checkbox>
              <ion-label>单号:{{item.ReferenceNumber}}</ion-label>
              <ion-note slot="end">目的地:{{item.CountryName}}</ion-note>
            </ion-item>

            <ion-item detail class="bottom-border" (click)="detail(item)">
              <ion-label>
                <h2>{{item.PriceName}}</h2>
                <p>计费重:{{item.Weight}}Kg</p>
                <p>货物属性:{{item.AttributeNames}}</p>
              </ion-label>
              <ion-note slot="end" class="ion-margin-vertical">￥{{item.Amount}}</ion-note>
            </ion-item>

            <ion-item>
              {{item.Date}}
              <ion-button slot="end" fill="outline" (click)="onItemConfirmClick(item)">确认出货</ion-button>
            </ion-item>
          </ion-list>
        </ion-card>

        <div class="empty-wrap" *ngIf="searchList?.length==0">
          <img src="assets/imgs/empty.png">
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
<ion-footer>
  <ion-toolbar>
    <ion-buttons>
      <ion-checkbox aria-label="全选" slot="start" (ionChange)="onAllClick()" [(ngModel)]="allSelected" style="margin-left: 0.5rem;"></ion-checkbox>
      <ion-label style="margin-left: 0.5rem;">{{allSelected?'反选':'全选'}}</ion-label>

    </ion-buttons>



    <ion-buttons slot="primary">
      <ion-button (click)="onConfirmClick()">
        确认所选

      </ion-button>
    </ion-buttons>
  </ion-toolbar>

</ion-footer>
