<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
	<ion-buttons slot="end">
		<ion-button (click)="batchReturn()">{{isShowCheckbox?'完成':'批量退货'}}</ion-button>
	</ion-buttons>
    <ion-title>交货记录</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="ion-padding-top" style="background-color: #fff;"></div>

    <ion-searchbar placeholder="原、转单号，国家，报价，运输方式，类型，子单号" showClearButton="focus" (ionInput)="searchItems()"></ion-searchbar>

  <ion-list *ngFor="let item of items" lines="none">
    <ion-item class="bottom-border order-head" [class.with-selector]="isShowCheckbox" (click)="clickCheckBox(item)">
	    <ion-checkbox aria-label="选择退货记录" *ngIf="isShowCheckbox" slot="start" [checked]="item.Selected"></ion-checkbox>
      <ion-label class="head-label">
        <div class="ref-no">原单号:{{item.ReferenceNumber}}</div>
        <div class="track-no">转单号:{{item.TrackNumber}}</div>
      </ion-label>
    </ion-item>
    <ion-item detail class="item-last" (click)="detail(item)">
      <ion-label>
        <h3>{{item.PriceName}}</h3>
        <p>计费重:{{item.Weight}}Kg</p>
        <p>计价时间:{{item.Date}}</p>
      </ion-label>
      <ion-note slot="end" class="ion-margin-vertical">{{item.Amount |currency:'CNY'}}</ion-note>
    </ion-item>
  </ion-list>
  <ion-fab horizontal="end" vertical="bottom" slot="fixed" (click)="waitingReturnList()">
    <ion-badge class="waitReturnCount" [color]="waitReturnCount > 0 ? 'danger' : 'medium'">{{waitReturnCount}}</ion-badge>
  	<ion-fab-button color="light">
      <ion-icon name="trash"></ion-icon>
  	</ion-fab-button>
  </ion-fab>
  <ion-infinite-scroll (ionInfinite)="scrollItems($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
