name: Phase0 CI

on:
  push:
    branches:
      - main
      - master
      - release/**
      - upgrade/**
  pull_request:

jobs:
  verify-phase0:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Phase 0 gates
        run: npm run verify:phase0
