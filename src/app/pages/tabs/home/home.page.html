<ion-content>
  <section class="hero-slider" *ngIf="slides.length > 0">
    <ion-slides class="hero-slides" [options]="slideOpts" [pager]="true">
      <ion-slide class="hero-slide" *ngFor="let slide of slides; trackBy: trackBySlideImage">
        <img [src]="slide.image" alt="首页轮播图" />
      </ion-slide>
    </ion-slides>
  </section>

  <ion-grid>

    <ion-row>
      <ion-col size="12">
        <h4>产品业务</h4>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col *ngFor="let product of products">
        <div (click)="openProduct(product)">
          <img [src]="product.image" />
        </div>
      </ion-col>

    </ion-row>
  </ion-grid>
  <ion-list lines="none">
    <ion-list-header>
      <h2>升蓝动态</h2>
    </ion-list-header>

      <ion-item [button]="true" [detail]="true" *ngFor="let item of news" lines="none" (click)="openNews(item)">
        <ion-thumbnail slot="start">
          <img [src]="item.image">
        </ion-thumbnail>
        <ion-label>
            <h2 class="ion-text-left">{{item.title}}</h2>
            <p class="ion-text-left">{{item.description}}</p> 
        </ion-label>
      </ion-item>

  </ion-list>
</ion-content>
