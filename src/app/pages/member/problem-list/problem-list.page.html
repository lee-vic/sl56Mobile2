<ion-header translucent="true" class="problem-list-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>问题跟进</ion-title>
  </ion-toolbar>
  <ion-toolbar class="search-toolbar">
    <ion-searchbar
      [value]="searchKeyword"
      placeholder="运单号、国家、渠道"
      showClearButton="focus"
      autocomplete="off"
      aria-label="搜索问题"
      (ionInput)="onSearchInput($event)"
      (ionClear)="clearSearch()">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="problem-list-content">
  <ion-refresher slot="fixed" (ionRefresh)="refreshItems($event)">
    <ion-refresher-content pullingText="下拉刷新" refreshingSpinner="crescent" refreshingText="正在刷新"></ion-refresher-content>
  </ion-refresher>

  <!-- Summary bar -->
  <div class="summary-bar" *ngIf="isLoaded">
    <div class="summary-stat">
      <span class="summary-value">{{items.length}}</span>
      <span class="summary-label">运单</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-stat">
      <span class="summary-value" [class.accent]="totalProblemCount > 0">{{totalProblemCount}}</span>
      <span class="summary-label">待处理问题</span>
    </div>
  </div>

  <!-- Skeleton loading -->
  <div class="list-shell" *ngIf="isLoading && items.length === 0" aria-label="加载中">
    <div class="shipment-card skeleton-card" *ngFor="let s of [1,2,3]">
      <div class="card-head">
        <ion-skeleton-text animated style="width: 52%; height: 18px; border-radius: 6px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 52px; height: 20px; border-radius: 10px;"></ion-skeleton-text>
      </div>
      <div class="skeleton-items">
        <div class="skeleton-item-row" *ngFor="let r of [1,2]">
          <ion-skeleton-text animated style="width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;"></ion-skeleton-text>
          <ion-skeleton-text animated style="flex: 1; height: 14px; border-radius: 4px;"></ion-skeleton-text>
        </div>
      </div>
      <div class="card-foot">
        <ion-skeleton-text animated style="width: 38%; height: 12px; border-radius: 4px;"></ion-skeleton-text>
      </div>
    </div>
  </div>

  <!-- Main list -->
  <div class="list-shell" *ngIf="!isLoading || items.length > 0">
    <div class="shipment-card" *ngFor="let item of items; trackBy: trackByProblem">
      <div class="card-head">
        <div class="card-head-left">
          <ion-icon name="cube-outline" class="shipment-icon"></ion-icon>
          <span class="shipment-no">{{item.No}}</span>
        </div>
        <ion-badge color="danger" class="problem-count-badge">
          <ion-icon name="warning-outline"></ion-icon>
          {{item.ProblemList?.length || 0}}
        </ion-badge>
      </div>

      <ion-list lines="full" class="problem-item-list">
        <ion-item
          button
          detail="false"
          *ngFor="let pro of item.ProblemList"
          (click)="problemDetail(item.Id, pro.ObjectId)"
          class="problem-item">
          <div slot="start" class="problem-icon-wrap">
            <ion-icon name="alert-circle-outline" color="warning"></ion-icon>
          </div>
          <ion-label class="ion-text-wrap problem-item-label">{{pro.ObjectName}}</ion-label>
          <div slot="end" class="problem-item-action">
            <span class="action-text">处理</span>
            <ion-icon name="chevron-forward-outline" class="action-chevron"></ion-icon>
          </div>
        </ion-item>
      </ion-list>

      <div class="card-foot">
        <ion-button fill="clear" size="small" class="detail-link-btn" (click)="detail(item)">
          <ion-icon slot="start" name="document-text-outline"></ion-icon>
          查看运单详情
        </ion-button>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-wrap" *ngIf="isLoaded && !isLoading && items.length === 0 && !hasLoadError">
      <img src="assets/imgs/empty.png" alt="暂无待处理问题">
      <p class="empty-title">{{searchKeyword ? '没有匹配结果' : '没有待处理问题'}}</p>
      <p class="empty-subtitle">
        {{searchKeyword ? '没有找到相关运单，可以清空关键词后重试。' : '当前没有需要跟进的问题，一切正常！'}}
      </p>
      <ion-button *ngIf="searchKeyword" fill="outline" size="small" (click)="clearSearch()">清空搜索</ion-button>
    </div>

    <!-- Error state -->
    <div class="error-wrap" *ngIf="hasLoadError && !isLoading">
      <ion-icon name="cloud-offline-outline"></ion-icon>
      <p class="error-title">加载失败</p>
      <p class="error-subtitle">网络或服务暂时不可用，请稍后重试。</p>
      <ion-button fill="outline" size="small" (click)="loadFirstPage(searchKeyword)">重新加载</ion-button>
    </div>
  </div>

  <ion-infinite-scroll (ionInfinite)="scrollItems($event)">
    <ion-infinite-scroll-content loadingSpinner="dots" loadingText="加载更多..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
