<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>
      提现管理
    </ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <!-- Skeleton loading -->
  <ng-container *ngIf="isLoading">
    <ion-grid id="info">
      <ion-row class="ion-align-items-center">
        <ion-col size="4" class="ion-text-center" *ngFor="let sk of [1,2]">
          <ion-skeleton-text animated style="width: 56px; height: 14px; margin: 0 auto;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width: 48px; height: 28px; margin: 6px auto 0;"></ion-skeleton-text>
        </ion-col>
      </ion-row>
    </ion-grid>
    <ion-grid id="info">
      <ion-row class="ion-align-items-center">
        <ion-col size="4" class="ion-text-center" *ngFor="let sk of [1,2]">
          <ion-skeleton-text animated style="width: 64px; height: 14px; margin: 0 auto;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width: 52px; height: 28px; margin: 6px auto 0;"></ion-skeleton-text>
        </ion-col>
      </ion-row>
    </ion-grid>
    <div class="skeleton-page">
      <div style="display: flex; gap: 10px; justify-content: center;">
        <ion-skeleton-text animated style="width: 80px; height: 36px; border-radius: 8px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 64px; height: 36px; border-radius: 8px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 72px; height: 36px; border-radius: 8px;"></ion-skeleton-text>
      </div>
    </div>
  </ng-container>

  <!-- Content -->
  <ng-container *ngIf="!isLoading">
  <ion-grid id="info">
    <ion-row class="ion-align-items-center">
      <ion-col size="4">
        <div class="ion-text-center">
          <div class="title">可提取收益（元）</div>
          {{amounts?.MostWithdrawalAmount}}
        </div>
      </ion-col>
      <ion-col size="4" class="ion-text-center">
        <div class="title">累计总收益（元）</div>
        {{amounts?.TotalAmount}}
      </ion-col>
    </ion-row>

  </ion-grid>
  <ion-grid id="info">
    <ion-row class="ion-align-items-center">
      <ion-col size="4">
        <div class="ion-text-center">
          <div class="title">待结算收益（元）</div>
          {{amounts?.EstimatedAmount}}
        </div>
      </ion-col>
      <ion-col size="4" class="ion-text-center">
        <div class="title">累计提取收益（元）</div>
        {{amounts?.TotalWithdrawalAmount}}
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-grid>
    <ion-row class="ion-align-items-center">
      <ion-col size="4">
        <ion-button color="primary" size="small" fill="outline" (click)="toUserInfo()">用户中心</ion-button>
      </ion-col>
      <ion-col size="4" class="ion-text-center">
        <ion-button color="primary" size="small" fill="outline" (click)="doWithdrawal()">提现</ion-button>
      </ion-col>
      <ion-col size="4" class="ion-text-center">
        <ion-button color="primary" size="small" fill="outline" (click)="toRecords()">提现记录</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-item-group>
    <ion-item-divider>
      <ion-label>说明&注意事项：</ion-label>
    </ion-item-divider>
    <ion-item>
      <ion-label class="smallFont">1、</ion-label>
    </ion-item>
  </ion-item-group>
  </ng-container>
</ion-content>
