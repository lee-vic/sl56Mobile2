<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>业务公告</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="notice-list-content">
  <section class="notice-list-stack" *ngIf="items.length > 0">
    <button type="button" class="notice-card" *ngFor="let item of items" (click)="openDetail(item)">
      <div class="notice-card-head">
        <span class="notice-card-time">{{ item.CreateAt }}</span>
        <ion-badge class="notice-card-badge" [color]="item.IsRead ? 'success' : 'danger'">{{ item.IsRead ? '已读' : '未读' }}</ion-badge>
      </div>

      <div class="notice-card-body">
        <h3>{{ item.Title }}</h3>
        <p>{{ item.Summary }}</p>
      </div>

      <ion-icon class="notice-card-chevron" name="chevron-forward"></ion-icon>
    </button>
  </section>

  <section class="notice-empty" *ngIf="!isBusy && items.length === 0">
    <p>暂无业务公告</p>
  </section>

  <ion-infinite-scroll (ionInfinite)="getItems()">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
