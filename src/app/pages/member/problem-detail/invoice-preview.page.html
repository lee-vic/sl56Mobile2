<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="danger" (click)="reSelect()">重选</ion-button>
    </ion-buttons>
    <ion-title>发票预览</ion-title>
    <ion-buttons slot="end">
      <ion-button color="primary" (click)="confirm()">确认</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <section id="pdfContent">
    <ion-note color="danger" *ngIf="loadFailed">
      PDF加载失败，请返回重选后重试。
    </ion-note>
    <pdf-viewer
      [src]="invoiceSrc"
      [show-all]="false"
      [render-text]="true"
      [original-size]="false"
      [page]="currentPage"
      (error)="onPdfError($event)"
      (after-load-complete)="onPdfLoaded($event)">
    </pdf-viewer>
  </section>
</ion-content>
<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="prevPage()">上一页</ion-button>
    </ion-buttons>
    <ion-title> 当前页：{{currentPage}}/共 {{totalPages}} 页</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="nextPage()">下一页</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
