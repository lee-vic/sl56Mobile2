<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>问题跟进</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="problem-list-content">
  <ion-refresher slot="fixed" (ionRefresh)="refreshItems($event)">
    <ion-refresher-content pullingText="下拉刷新问题列表"></ion-refresher-content>
  </ion-refresher>

  <div class="page-wrap">
    <section class="hero">
    
      <ion-searchbar
        class="search"
        [value]="searchKeyword"
        placeholder="输入运单号、国家、渠道、问题类型"
        showClearButton="always"
        (ionInput)="onSearchInput($event)"
        (ionClear)="clearSearch()">
      </ion-searchbar>

      <div class="summary-row">
        <div class="stat-card">
          <span class="stat-label">运单</span>
          <span class="stat-value">{{items.length}} 条</span>
        </div>
        <div class="stat-card stat-card-accent">
          <span class="stat-label">问题</span>
          <span class="stat-value">{{totalProblemCount}} 项</span>
        </div>
      </div>
    </section>

    <section class="list-shell" *ngIf="!hasLoadError">
      <ion-card class="shipment-card" *ngFor="let item of items; trackBy: trackByProblem">
        <ion-card-header>
          <ion-card-title>{{item.No}}</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-item lines="none" class="card-action">
            <ion-label>共 {{item.ProblemList?.length || 0}} 个待处理问题</ion-label>
            <ion-button fill="outline" size="small" (click)="detail(item)">查看运单详情</ion-button>
          </ion-item>

          <ion-list lines="full">
            <ion-item button detail="true" *ngFor="let pro of item.ProblemList" (click)="problemDetail(item.Id,pro.ObjectId)">
              <ion-icon slot="start" name="alert-circle-outline" color="warning"></ion-icon>
              <ion-label class="ion-text-wrap">{{pro.ObjectName}}</ion-label>
              <ion-note slot="end">去处理</ion-note>
            </ion-item>
          </ion-list>
        </ion-card-content>
      </ion-card>

      <ion-card class="empty-state" *ngIf="isLoaded && items.length === 0">
        <ion-card-content>
          <ion-icon name="checkmark-done-circle-outline" color="success"></ion-icon>
          <h3>没有待处理问题</h3>
          <p>当前筛选条件下没有查询到问题记录，可以尝试清空关键词后重试。</p>
        </ion-card-content>
      </ion-card>
    </section>

    <section *ngIf="hasLoadError">
      <ion-card class="error-card">
        <ion-card-content>
          <h3>加载失败</h3>
          <p>网络或服务暂时不可用，请稍后重试。</p>
          <ion-button expand="block" (click)="loadFirstPage(searchKeyword)">重新加载</ion-button>
        </ion-card-content>
      </ion-card>
    </section>
  </div>

  <ion-infinite-scroll (ionInfinite)="scrollItems($event)">
    <ion-infinite-scroll-content loadingSpinner="dots" loadingText="加载更多问题..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
