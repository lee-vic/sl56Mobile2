<ion-header>
  <ion-toolbar>
    <ion-title>登录</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="forgetPasswordClick()">
        <ion-icon name="help-circle-outline" slot="start"></ion-icon>
        忘记密码？
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>


<ion-content class="login-content">
  <ion-grid fixed class="login-shell">
    <ion-row class="ion-justify-content-center ion-padding-top">
      <ion-col size="12" size-md="10" size-lg="8">
        <ion-card class="login-card ion-no-margin">
          <ion-card-header>
            <ion-card-title>
              <ion-icon name="person-circle-outline"></ion-icon>
              欢迎登录
            </ion-card-title>
            <ion-card-subtitle>请输入账号信息以继续使用系统功能。</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <form (ngSubmit)="doLogin(authForm.value)" [formGroup]="authForm" novalidate class="login-form">
              <ion-list lines="none" class="ion-no-margin">
                <ion-item class="login-input-item">
                  <ion-input
                    aria-label="用户名"
                    label="用户名"
                    labelPlacement="stacked"
                    fill="outline"
                    type="text"
                    formControlName="username"
                    placeholder="请输入手机号码"
                  ></ion-input>
                </ion-item>
                <ion-item class="login-input-item">
                  <ion-input
                    aria-label="密码"
                    label="密码"
                    labelPlacement="stacked"
                    fill="outline"
                    type="password"
                    formControlName="password"
                    placeholder="请输入密码 区分大小写"
                  ></ion-input>
                </ion-item>
              </ion-list>
              <ion-note color="medium" class="login-tip">建议使用手机号登录，密码区分大小写。</ion-note>
              <ion-button expand="block" shape="round" size="large" type="submit" class="ion-margin-top" [disabled]="!authForm.valid || isLoggingIn">{{isLoggingIn ? '登录中...' : '登录'}}</ion-button>
            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
