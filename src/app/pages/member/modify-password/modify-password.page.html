<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>修改密码</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="password-page">
  <ion-grid fixed class="password-shell">
    <ion-row class="ion-justify-content-center ion-padding-top">
      <ion-col size="12" size-md="10" size-lg="8">
        <ion-card class="password-card ion-no-margin">
          <ion-card-header>
            <ion-card-title>
              <ion-icon name="lock-closed-outline"></ion-icon>
              修改登录密码
            </ion-card-title>
            <ion-card-subtitle>为保障账号安全，请先验证旧密码，再设置新密码。</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <ion-chip color="primary" outline>
              <ion-icon name="shield-checkmark-outline"></ion-icon>
              <ion-label>建议密码包含字母与数字组合，且避免与旧密码重复</ion-label>
            </ion-chip>
            <form (ngSubmit)="doNext(myForm.value)" [formGroup]="myForm" novalidate class="password-form ion-margin-top">
              <ion-list lines="none" class="ion-no-margin">
                <ion-item>
                  <ion-input
                    aria-label="旧登录密码"
                    label="旧登录密码"
                    labelPlacement="stacked"
                    fill="outline"
                    type="password"
                    formControlName="password"
                    placeholder="请输入原有登录密码，区分大小写"
                  ></ion-input>
                </ion-item>
                <div class="validation-errors">
                  <div *ngFor="let validation of validation_messages.password">
                    <ng-container>
                      <div class="error-message" *ngIf="myForm.get('password').hasError(validation.type) && (myForm.get('password').dirty || myForm.get('password').touched)">
                        {{validation.message}}
                      </div>
                    </ng-container>
                  </div>
                </div>

                <ion-item>
                  <ion-input
                    aria-label="新登录密码"
                    label="新登录密码"
                    labelPlacement="stacked"
                    fill="outline"
                    type="password"
                    formControlName="newPassword1"
                    placeholder="请输入新登录密码，区分大小写"
                  ></ion-input>
                </ion-item>
                <div class="validation-errors">
                  <div *ngFor="let validation of validation_messages.newPassword1">
                    <ng-container>
                      <div class="error-message" *ngIf="myForm.get('newPassword1').hasError(validation.type) && (myForm.get('newPassword1').dirty || myForm.get('newPassword1').touched)">
                        {{validation.message}}
                      </div>
                    </ng-container>
                  </div>
                </div>

                <ion-item>
                  <ion-input
                    aria-label="确认新登录密码"
                    label="确认新登录密码"
                    labelPlacement="stacked"
                    fill="outline"
                    type="password"
                    formControlName="newPassword2"
                    placeholder="请再一次输入新的登录密码"
                  ></ion-input>
                </ion-item>
                <div class="validation-errors">
                  <div *ngFor="let validation of validation_messages.newPassword2">
                    <ng-container>
                      <div class="error-message" *ngIf="myForm.get('newPassword2').hasError(validation.type) && (myForm.get('newPassword2').dirty || myForm.get('newPassword2').touched)">
                        {{validation.message}}
                      </div>
                    </ng-container>
                  </div>
                </div>
              </ion-list>

              <ion-note color="medium" class="form-tip">修改后请使用新密码重新登录。</ion-note>
              <ion-button class="submit-btn" size="large" expand="block" type="submit" [disabled]="!myForm.valid">确定</ion-button>
            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
