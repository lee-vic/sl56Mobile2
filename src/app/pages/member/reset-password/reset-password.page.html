<ion-header>
  <ion-toolbar>
      <ion-buttons slot="start">
          <ion-back-button></ion-back-button>
        </ion-buttons>
    <ion-title>重置密码</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="reset-content">
  <ion-grid fixed class="reset-shell">
    <ion-row class="ion-justify-content-center ion-padding-top">
      <ion-col size="12" size-md="10" size-lg="8">
        <ion-card class="reset-card ion-no-margin">
          <ion-card-header>
            <ion-card-title>找回密码</ion-card-title>
            <ion-card-subtitle>按步骤完成身份验证并设置新密码。</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <ion-segment [(ngModel)]="tab" mode="ios">
              <ion-segment-button value="1">
                <ion-label>1 验证身份</ion-label>
              </ion-segment-button>
              <ion-segment-button value="2" [disabled]="tab2Disabled">
                <ion-label>2 设置新密码</ion-label>
              </ion-segment-button>
              <ion-segment-button value="3" [disabled]="tab3Disabled">
                <ion-label>3 完成</ion-label>
              </ion-segment-button>
            </ion-segment>
            <ion-progress-bar [value]="tab === '1' ? 0.33 : (tab === '2' ? 0.66 : 1)" class="ion-margin-top"></ion-progress-bar>
            <div [ngSwitch]="tab" class="ion-margin-top">

              <div *ngSwitchCase="'1'">
                <ion-chip color="primary" outline>
                  <ion-icon name="shield-checkmark-outline"></ion-icon>
                  <ion-label>请输入注册手机/邮箱并完成验证码验证</ion-label>
                </ion-chip>
                <form (ngSubmit)="doNext2(myForm2.value)" [formGroup]="myForm2" novalidate class="reset-form">
                  <ion-list lines="none" class="ion-no-margin">
                    <ion-item class="input-item">
                      <ion-input
                        aria-label="手机号码或邮箱"
                        label="手机号码/邮箱"
                        labelPlacement="stacked"
                        fill="outline"
                        type="text"
                        formControlName="mobile"
                        placeholder="请输入您在我公司开户时留存的手机号码/邮箱"
                      ></ion-input>
                    </ion-item>
                    <div class="validation-errors ion-padding-start">
                      <div *ngFor="let validation of validation_messages.mobile">
                        <ng-container>
                          <div class="error-message" *ngIf="myForm2.get('mobile').hasError(validation.type) && (myForm2.get('mobile').dirty || myForm2.get('mobile').touched)">
                            {{validation.message}}
                          </div>
                        </ng-container>
                      </div>
                    </div>
                    <ion-item class="input-item with-end-button">
                      <ion-input
                        aria-label="验证码"
                        label="验证码"
                        labelPlacement="stacked"
                        fill="outline"
                        type="text"
                        formControlName="code"
                        placeholder="请输入验证码"
                      ></ion-input>
                      <ion-button slot="end" (click)="getCode($event)" class="my-code" [disabled]="btnDisabled" fill="outline" size="small">{{codeText}}</ion-button>
                    </ion-item>
                    <div class="validation-errors ion-padding-start">
                      <div *ngFor="let validation of validation_messages.code">
                        <ng-container>
                          <div class="error-message" *ngIf="myForm2.get('code').hasError(validation.type) && (myForm2.get('code').dirty || myForm2.get('code').touched)">
                            {{validation.message}}
                          </div>
                        </ng-container>
                      </div>
                    </div>
                  </ion-list>
                  <ion-button shape="round" size="large" expand="block" type="submit" [disabled]="!myForm2.valid">下一步</ion-button>
                </form>
              </div>
              <div *ngSwitchCase="'2'">
                <ion-chip color="warning" outline>
                  <ion-icon name="lock-closed-outline"></ion-icon>
                  <ion-label>请设置并确认新的登录密码</ion-label>
                </ion-chip>
                <form (ngSubmit)="doNext3(myForm3.value)" [formGroup]="myForm3" novalidate class="reset-form">
                  <ion-list lines="none" class="ion-no-margin">
                    <ion-item class="input-item">
                      <ion-input
                        aria-label="您的新密码"
                        label="您的新密码"
                        labelPlacement="stacked"
                        fill="outline"
                        type="password"
                        formControlName="newPassword1"
                        placeholder="请输入你的新密码"
                      ></ion-input>
                    </ion-item>
                    <ion-item class="input-item">
                      <ion-input
                        aria-label="确认新密码"
                        label="确认新密码"
                        labelPlacement="stacked"
                        fill="outline"
                        type="password"
                        formControlName="newPassword2"
                        placeholder="请再次输入新密码"
                      ></ion-input>
                    </ion-item>
                  </ion-list>
                  <ion-button shape="round" size="large" expand="block" type="submit" [disabled]="!myForm3.valid">下一步</ion-button>
                </form>
              </div>
              <div *ngSwitchCase="'3'">
                <ion-card color="success" class="success-card">
                  <ion-card-header>
                    <ion-card-title>
                      <ion-icon name="checkmark-circle-outline"></ion-icon>
                      操作成功
                    </ion-card-title>
                  </ion-card-header>
                  <ion-card-content>
                    您的密码已成功重置
                  </ion-card-content>
                </ion-card>
                <ion-button expand="block" size="large" (click)="toLogin()">去登录</ion-button>
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
