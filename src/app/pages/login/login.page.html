<ion-header>
  <ion-toolbar>
    
    <ion-buttons slot="end">
      <ion-button (click)="forgetPasswordClick()">
        忘记密码？
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding">
  <form (ngSubmit)="doLogin(authForm.value)" [formGroup]="authForm" novalidate>

    <h1>登录</h1>

    <ion-list inset lines="none">
      <ion-item>
        <ion-input
          aria-label="用户名"
          label="用户名"
          labelPlacement="stacked"
          fill="outline"
          type="text"
          formControlName="username"
          placeholder="请输入手机号码"
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          aria-label="密码"
          label="密码"
          labelPlacement="stacked"
          fill="outline"
          type="password"
          formControlName="password"
          placeholder="请输入密码 区分大小写"
        ></ion-input>
      </ion-item>
    </ion-list>
    <!-- <ion-item>
      <ion-label>绑定微信</ion-label>
      <ion-checkbox formControlName="isBind"></ion-checkbox>
    </ion-item> -->
    <ion-button expand="block" shape="round" type="submit" [disabled]="!authForm.valid">登录</ion-button>


  </form>
  <!-- <ion-button  (click)="getCookie()">
    Cookie
   </ion-button> -->
</ion-content>
